<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script  src="./ac1a941554d9513009e5a2a64284eb5.js" ></script>
    <link rel="icon" href="./v2-e7e4655eecff921044ede4e27cfe96d6_r.ico" type="image/x-icon">
    <link rel="shortcut icon" href="./v2-e7e4655eecff921044ede4e27cfe96d6_r.ico" type="image/x-icon">
    <title>功德积累器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .merit-button {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(145deg, #ffd700, #ffb300);
            border: none;
            box-shadow: 0 8px 25px rgba(255, 179, 0, 0.4);
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            color: #8b4513;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            z-index: 10;
        }

        .merit-button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 179, 0, 0.5);
        }

        .merit-button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(255, 179, 0, 0.3);
        }

        .merit-counter {
            position: fixed;
            bottom: 50px;
            font-size: 28px;
            font-weight: bold;
            color: #333333;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .merit-plus {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            animation: floatUp 1.5s ease-out forwards;
            z-index: 1000;
        }

        .eye-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            z-index: 9999;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: popIn 0.15s ease-out forwards;
        }

        .eye-emoji {
            font-size: clamp(120px, 25vw, 250px);
            color: #ff0000;
            animation: blink 0.4s infinite alternate;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(1.5);
            }
        }

        @keyframes blink {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0.2;
                transform: scale(1.15);
            }
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>
    <button class="merit-button" id="meritBtn">积累功德</button>
    <div class="merit-counter">今日已加功德：<span id="meritCount">0</span></div>

    <script>
        let todayMerit = parseInt(localStorage.getItem('todayMerit')) || 0;
        const meritCountEl = document.getElementById('meritCount');
        const meritBtn = document.getElementById('meritBtn');
        
        meritCountEl.textContent = todayMerit;

        function eyeEffect() {
            const el = document.createElement('div');
            el.className = 'eye-effect';
            const img = document.createElement('img');
            img.src = 'http://www.0714.com/uploads/20250423/1745392512515233.gif';
            img.style.width = '250px';
            img.style.height = 'auto';
            img.style.objectFit = 'contain';
            img.onerror = function() {
                this.src = 'http://www.0714.com/uploads/20250423/1745392512515233.gif';
                this.onerror = function() {
                    this.remove();
                    const emoji = document.createElement('span');
                    emoji.className = 'eye-emoji';
                    emoji.textContent = '喵';
                    el.appendChild(emoji);
                };
            };
            
            el.appendChild(img);
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function showMeritPlus(x, y) {
            const meritPlus = document.createElement('div');
            meritPlus.className = 'merit-plus';
            meritPlus.textContent = '+100';
            meritPlus.style.left = x + 'px';
            meritPlus.style.top = y + 'px';
            document.body.appendChild(meritPlus);
            
            setTimeout(() => meritPlus.remove(), 1500);
        }

        meritBtn.addEventListener('click', (e) => {
            eyeEffect();
            showMeritPlus(e.clientX, e.clientY - 50);
            todayMerit += 100;
            meritCountEl.textContent = todayMerit;
            localStorage.setItem('todayMerit', todayMerit);
        });

        function checkNewDay() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('meritDate');
            
            if (savedDate !== today) {
                todayMerit = 0;
                localStorage.setItem('todayMerit', 0);
                localStorage.setItem('meritDate', today);
                meritCountEl.textContent = todayMerit;
            }
        }
        
        checkNewDay();
    </script>
</body>
</html>

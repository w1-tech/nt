        * {

            padding: 0;
            box-sizing: border-box;

        body {
            background: linear-gradient(rgba(255, 182, 193, 0.644), rgba(255, 112, 183, 0.667)),

            min-height: 100vh;

        nav {

            align-items: center;
            padding: 25px 60px;
            width: 100%;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-heart {
            width: 36px;
            height: 32px;
            position: relative;
        }

        .logo-heart::before, .logo-heart::after {
            content: '';
            position: absolute;
            top: 0;
            width: 18px;
            height: 28px;
            border-radius: 18px 18px 0 0;
            background: #ff3385;
        }

        .logo-heart::before {
            left: 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .logo-heart::after {
            left: 18px;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .logo-text {
            color: #ff3385;
            font-size: 28px;
            font-weight: bold;
            font-style: italic;
        }

        .logo-desc {
            color: #ad1457;
            font-size: 12px;
            margin-top: 2px;
        }

        .nav-menu {

            gap: 50px;
        }

        .nav-menu a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            opacity: 0.9;
            transition: opacity 0.3s;
        }

        .nav-menu a:hover {
            opacity: 1;
        }

        .nav-btn-group {
            display: flex;
            gap: 15px;
        }

        .btn-login {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 8px 28px;
            border-radius: 22px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: rgba(255,255,255,0.2);
        }

            background: #ff3385;
            border: none;
            color: #fff;
            padding: 8px 28px;
            border-radius: 22px;
            font-size: 16px;
            cursor: pointer;

        }

            line-height: 1.2;
            margin-bottom: 15px;

        }

        .tag-item {

            align-items: center;
            gap: 8px;

        }

        .tag-icon {
